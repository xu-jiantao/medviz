name: 打包发布 (Build & Release)

# 触发方式：
#   1) 推送 v 开头的 tag（如 v0.1.0）→ 自动打包并创建 Release
#   2) 在 GitHub 网页 Actions 页手动运行（workflow_dispatch）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS：Apple 芯片原生包（含内置 Python 后端）
          - platform: macos-latest
          # Windows：x64 的 .msi / .exe（含内置 Python 后端）
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 构建内置 Python 后端 sidecar (PyInstaller)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pyinstaller
          ( cd backend && pyinstaller --onefile --name medviz-backend \
              --collect-all statsmodels --collect-all lifelines --collect-all scipy \
              --collect-all formulaic --collect-all autograd --collect-submodules uvicorn \
              --hidden-import=app --hidden-import=nomogram_fit server_entry.py )
          TRIPLE=$(rustc -Vv | grep host | cut -d' ' -f2)
          mkdir -p src-tauri/binaries
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp "backend/dist/medviz-backend.exe" "src-tauri/binaries/medviz-backend-$TRIPLE.exe"
          else
            cp "backend/dist/medviz-backend" "src-tauri/binaries/medviz-backend-$TRIPLE"
            chmod +x "src-tauri/binaries/medviz-backend-$TRIPLE"
          fi
          # macOS：给 sidecar ad-hoc 签名，避免破坏 .app 包的签名封印（否则下载后报“已损坏”）
          if [ "$RUNNER_OS" = "macOS" ]; then
            codesign --force -s - "src-tauri/binaries/medviz-backend-$TRIPLE"
          fi

      - name: 安装前端依赖
        run: npm ci

      - name: 打包并发布
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MedViz ${{ github.ref_name }}'
          releaseBody: '医学数据可视化工具桌面版（已内置统计拟合后端 + 注册登录）。Mac 用户下载 .dmg，Windows 用户下载 .msi 或 .exe。'
          releaseDraft: false
          prerelease: false
